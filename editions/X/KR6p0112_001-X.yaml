body:
  text: 性相光明品第一諸仁者夙昔有緣同來聽法將宣妙義先淨其心身口安詳無諸亂動當運心中信慧香花專伸供養十方賢聖共展靈音切莫等閒以為容易顯現自在力為說微妙機無量諸眾生悉受西方記十方三世佛阿彌陀第一九品度眾生威德無窮極佛力無邊即今人人會念南無阿彌陀佛善哉善哉南無阿彌陀佛六箇字諸人可解乎南無歸命也阿者無也彌陀者量也佛者光明覺也阿彌陀佛乃是人人心中無量光明諸仁者汝等皆從無量光明中來將來決定還歸無量光明中去汝等自思即今身心在於何處與此無量光明是合是離是一是二本自無終始何須辨假真凝神思索處應見本來人當知本性光明原無邊際運運不隔彌陀現前特因無始一念不覺頓起無明流轉生死故不見耳故釋迦佛於此娑婆示現初成正覺從空現有說法度生空空世界海渺渺虗空輪塵剎諸如來應機而化導剎剎塵塵各標淨穢無邊因果起落重重我等所居之娑婆本師釋迦今方滅度無佛可見也在此娑婆之外向西而去十萬億佛土其剎名曰極樂世界現在有佛名阿彌陀在其中說法二尊分兩土以法救羣迷為勸居東者回心直向西經云彼佛光明無量照十方國無所障礙是故號為阿彌陀既照十方國土必不棄此娑婆既具無量光明必有多多靈感故一稱其名即得往生受其教化本自心中現光涵世界多從今一直去念念見彌陀眾生心中佛佛心中眾生譬如兩鏡交融光明不異光中現影萬影一光所以今日之人不論老小賢愚喜極則稱阿彌陀佛苦極則稱阿彌陀佛觸事逢緣皆此四字以光明無有二也有緣齊受度久被佛恩多點化娑婆眾光明出愛河光明無二身剎則多欲出世界豈可不知世界之相世界初起先結風輪於虗空中凝然而轉是眾生業識所感也風中起雲雲中降雨霈然洪注風輪持之風輪之中生鐵圍山一切大海皆在山內海之中間有七金山四面海中生四大洲及各小洲七金山內又生香水海香水海裏生須彌山須彌山腰四面有埵四天王所居名為第一天也日月環繞山腰而過山頂寬平四面各有天王八位中央玉帝統御諸天名為三十三天其實第二天也此二天地居天也三夜摩天四兜率天五化樂天六自在天此等皆雲中居總為欲界六天有種非天名曰修羅有天之福無天之德從欲界天下至地獄畜生餓鬼與人雜居畜生餓鬼地獄苦不可言名三惡道天人修羅名三善道皆分男女睡眠財食互生互殺名欲界而已上有色界但是色身全是男子常居禪定不用身口如是色界有四層色界之上便是空界天亦有四層娑婆世界相本住風輪毬上有日月輪照此山海洲雲居地居天上及於初禪再推而再遠一千一千千千箇一千千名為大千界花嚴剎海深映入無中外小世界圖四天王天第一忉利天第二名地居天夜摩第三兜率第四化樂第五他化第六名雲居天初禪三層天在欲界六天之上梵眾天第七梵輔天第八大梵天第九上從大梵下至鐵圍一箇風輪所持名為小世界小千世界圖每一小世界縮為一點如是一千箇小世界有一箇二禪天統之名為小千小千即一千也少光天第十無量光天第十一光音天第十二總名第二禪天中千世界圖每一小千世界縮為一點如是一千箇小千有一箇三禪天統之名為中千中千即二千也少淨天第十三無量淨天第十四徧淨天第十五總名第三禪天大千世界圖每一中千世界縮為一點如是一千箇中千有一箇四禪天統之名為大千大千即三千也千箇千千故曰三千福生天第十六福愛天第十七廣果天第十八總名第四禪天剎塵世界圖將此三千大千世界碎為微塵一一微塵作一大千名剎塵世界此中世界之數極多如是名一剎塵世界也再加二箇三箇即為二剎塵世界三剎塵世界一蓮花世界海圖於花嚴法界無量蓮花中一一皆現無量世界海我等所居在正中一蓮花此花現二十重世界第一層一剎塵世界第二層二剎塵世界最上第二十層有二十剎塵世界娑婆極樂在十三層世界正中我等所居一箇小世界初成之時第二禪天中光音天人從空而下各有神足飛行自在因食地肥體重光滅不能飛起化為地上眾生久之分為男女二相地肥不生乃生米穀朝割暮生無窮無盡眾生貪起乃有盈虗割不再生更起爭奪因分田土各自種之立田主以統眾人名剎帝利即王類也傳歷多王有凡有聖凡王駐地聖王能飛輪行空傳至淨飯王時兄弟四人各領國土妃號摩耶夫人其時釋迦如來在兜率天宮內院為補處菩薩名曰護明化為白象入母口中十月而生名悉達太子賢劫千佛第四尊初從兜率天宮降化為白象入母口從右脅出而始生一手指天一指地天上天下為獨尊童子地中文武全有輪王福而不受指妃之腹而有孕為父傳後即出家六年苦行知全非一念圓觀成正覺大啟花嚴一乘教阿含第二方等三四說般若五法華度生已畢自滅度佛滅度後一切大士奉行佛法以度含靈禪教律三門一一指歸心性最後方便名淨土法門即是依阿彌陀經念佛求生極樂也此方彌勒龍華會要等八百七十餘萬年不若早生西方親聞彌陀說法也專切讚彌陀極樂莊嚴處唯願一切人速往西方去此阿彌陀佛光明無量亦名無量光佛壽命無量亦名無量壽佛光無量示度生之多壽無量示度生之久也世間萬法分名立相肉眼觀之似有種種慧眼觀之但是無量光明耳所以古人云自性彌陀恒常清淨唯心淨土無有封疆至妙至𢆯機一直無彎曲非淺亦非深佛機原具足大根大器之人才提此一句佛當下洞然無有疑惑一切不滯佛法都圓則自性彌陀惟心淨土明明現在盡十方世界是自己本光那有十萬億程途但是一心不亂而已若未了悟生死方長但將一句彌陀勤勤憶念念到一心不亂忽然心花開明佛境本來現成方知一切全是自家不是從人討得也又有種人不知悟法以彼念佛有力習氣漸漸輕鬆如磨鏡輪久而自亮一心不亂見佛往生此是修行捷徑妙能總三根而并度也大光明中日來月往輾轉化度無窮矣一際光明照十方巍巍不動法中王無邊世界三災起淨土高標七寶幢彌陀光照本無邊大地虗空及遠天何處是人歸結處青黃赤白紫金蓮更無魔外與兵戈一片光華顯佛陀諸上善人同聚會化禽天樂六時多奇哉一念感西方接引而生大吉祥如此娑婆真熱惱不如歸去便清涼從光明中說此極樂世界一切智愚皆當往生如禪宗五派臨濟曹洞溈仰法眼雲門也今但存臨濟曹洞二派講家三派天台賢首慈恩也天台立四教賢首立五教慈恩則專談相宗唯識而已律家一派及一切修行無專法之人皆須各隨己力念佛往生映入九品方能不退不退者不退於菩提也非此光明一心乎完我一心量念佛阿彌陀十方諸剎海從此息奔波背覺合塵品第二大光明中不假安排一切圓滿既迷本覺即是無明夫真空法體光明常滿十方眾生歷劫輪回只為不知有佛耳起無邊之暗空生覺裏寶失衣中情才生智已隔矣若不於念佛上著倒一切無有了期古人云入海算沙徒知自困又云久處人天惡業便起嗚呼況在三途乎生生不靈自絕聖路最可哀也生殺迭起水火相爭業報住還鉤鎖不絕真不知其何所止也從一妄想成殺盜婬是為弊惡妄想昏昏入夢認為真便把閽人作主人引起無邊生死事番番出入賊來賓殺相爭相殺幾時休錯換頭顱更起仇有意無心都是孽將他性命作珍羞盜晝夜忙忙不得閑何時金玉積如山人天坐處更番變管庫財神又換斑婬此身本是誤中來又把風流引俗胎自赴鐵床銅柱獄紛紛習氣未能灰生前不覺既屬可傷死後輪回何能自主百年瞬息耳至命終時一生善惡俱時現前宿世今生一切冤對悉難逃避纖毫過失孽鏡照之一點魂靈隨之而墮縱善惡兩平之輩鉤考未及之人中有飄颻七生七死亦太苦矣一經報定無路轉身生天上者尚不免迷荒癡鈍之哀入地獄者孰能逃剝割烹煎之慘人中碌碌事不從心畜類昏然遞相吞噉鬼則有無窮之苦趣魔則逞狂醉之凶威頃刻命終泥犁有分倐忽輪轉不得停留視此境界無一非背覺合塵之報也本性常覺則海濶天空般若無權則網羅密布矣哀哉大險汝欲蹈之譬如盲人獨行荊棘林中夜雨昏黑無可問路終竟喪身失命落塹墮坑衣破身傷不知其處地獄慘極心昏惡未消長年受苦實難熬千生萬死身形換頃刻阿旁又試刀畜生可憐生死不曾停命賤身輕體不靈猶欲爭強互婬殺畜生心事太零星餓鬼慘澹飄搖鬼趣哀苦辛奔走役風雷貧窮更受燒身報幻影重重痛不回人道人身幸得己非安百歲須臾落死關一點假銀充不去半生辛苦更何堪修羅人我相爭勝負臨飛沙走石殺人心修羅太苦酣征戰魂夢匇匇刀箭林天道十善頑修夢入天精求秘訣作羣仙未消結限離生死無量精神總落邊如此六道七趣昏昏無一可憑不亦慘乎歸家有路慈母望汝甚切眾生不孝乃負其恩愈逞其能離宗更遠把一尊阿彌陀佛置之腦後千靈萬聖何能救你苦哉謗般若處處亂真心引得千生誤何時得好音南北東西高低淨穢十方國土無量眾生也即眾生性中之別現出佛性中之同即佛心性之同現出眾生之異棄無邊海認此一漚真可哀也判成兩地真離隔淨穢分途報各殊不說往生方便事誰從頂上出醍醐彼土阿彌陀佛時劫方長此土釋迦世尊早早滅度眾生福薄背覺合塵故此釋迦住世不久穢土既苦人命又促所以折眾生也淨土既樂壽命又無量所以攝眾生也釋迦化身生於此娑婆一四天下南贍部洲五印度中迦毗羅國其生之年應此震旦國周昭王二十四年甲寅四月八日至穆王五十二年壬申二月十五日於拘尸那城外娑羅雙樹間入涅槃至漢明帝永平十一年帝夢金人項佩日光飛行殿宇遣使求於西域乃得佛經像及梵僧二人來於東土於鴻臚寺安奉之後因改為白馬寺諸經漸漸東來三學迭興淨土法門亦啟背覺無所知覺者來度之化現方便力破盡貪嗔癡昔慧遠大師能依佛誠言開淨土法門教此方人求生彼國六時精進三毒消亡親見彌陀接引破諸黑暗林現此光明路合塵之輩從此離塵也即以塵中人化作出塵侶輾轉如來恩望汝生西去病起則藥來肚饑則飯熟以塵掩覺全覺是塵以覺破塵全塵是覺其智者頓然悟入知背覺之非則在塵離塵塵原不礙故曰六塵不惡還同正覺也花嚴經云花藏世界所有塵一一塵中見法界誰為塵乎誰為覺乎一覺大夢醒不覺夢方酣辛苦受輪回何日返家山消息輪回品第三人心欲求好先當問自家生死輪回不過一場夢你若不醒十分酣睡夢中入夢何時了局你若厭惡輪回一念才空輪回已破矣雖然說之甚易證入則難蓋輪回有輪回之根其根不拔故無可下手勉強下手亦不中用究竟是空忙故當消息之矣從迷而入悟一念是真關虎鬥龍爭息方知變化閒消其習氣息其妄想何謂習氣此乃自然而然逢時觸境不期發而自發如病瘧人雖不見其病而病常在隔一日又寒熱森然矣何謂妄想此乃起心動念自家不肯饒自家一念才起千思萬慮引發不休妄想如林入中不出內計眼耳鼻舌身意外逐色聲香味觸法鼓起一輪高低任轉欲進欲退必不能中途自止法相上勘不破到處總是憧憧往來故宜消之息之矣消如水枯息如火滅水火不爭一心常定久而自出輪回矣菴門終日不曾開塔上銅鈴送響來勸爾不如閑暇好寒冰熱火最堪哀一夢邯鄲已自醒夢中靈處豈常靈秋風葉落蕭條甚狂醉心思可暫停下水船來勢更狂忽然風逆且商量世間多少乘除事逼極能飛計更良打落重重障礙自然脫體清涼可憐塵海更茫茫障裏還生別障圈子跳不出大大的一跳就出了他又另起一箇圈子趁你手脚做不穩時再來圈你你決決的一跳跳過永不入他也不柰你何只怕你所跳出之處但出小圈不出大圈則消者不消其水方長息者不息其火方大則輪回不曾損動一毫也有人嚇你說圈子外更有圈子有人騙你說圈子裏本無圈子人說的話究竟不能脫你的苦不出圈子裏顛倒夢魂多誤聽旁人話依然入網羅明明白白地解脫現前你尚徘徊不肯自信何能妄冀他人代你喫這箇苦苦要自己喫也既知是病即便醫之何能養虎貽患本來水月鏡中燈又說光明透幾層認影原來全不是炎炎夏日自無冰夢中一物不堪用醒後追思也太愚你是聰明伶俐漢而今偏自學糊塗不欺自己即心安何處行人更有關匹馬單刀多事極不如長作臥龍閑苦苦還生苦苦鬆鬆便得鬆鬆忽然心事轉玲瓏仍舊天衣無縫從今以後不用在空中更著一條釘空中著釘必然墮落自知其苦即便捨之用心求離名為得法火宅不可住沈溺亦堪衰翛然而得路本不用安排淨土因緣品第四云何得路路在心中脫苦往生非無方便葢自性光明本能照見萬法無邊依正頭緒分明正為身心依為世界身心世界總是一光於此光中念佛往生是名無上方便處處幢幢風入定層層樓閣寶含光人心到此全無垢盡是如來解脫香八功德水映金沙七寶池中九品花禽鳥勸人勤念佛六時天樂不喧譁阿彌陀佛左有觀音右有勢至黃金為地百寶莊嚴無有女人無有魔外無有地獄餓鬼畜生無有修羅但是人天兩道一統佛化而已我佛金身常照耀十方世界現光中分明土土融成片不染凡塵一點紅四十八條成佛願無邊功德利羣生同歸極樂離諸苦妙向無生現有生四十八願內有一願云若有眾生至心稱念我之名號乃至十念欲生我國若不生者我不作佛可見人能信心精進定得往生也此是橫超三界法直從東土到西方頓融三輩歸安樂自有蓮花運運香經云不可以少善根福德因緣得生彼國可見一切功德均屬微細唯有念佛功德其光明無量不可思議也此阿彌陀佛四字一稱其名滅八十億劫生死重罪但在至誠功德即勝諸佛所說真實不虗脫苦良方此為最捷不誦經文不坐禪也無佛法與君傳只將一句彌陀佛用作西方淨土緣念佛人皆有宿緣從今更不落人天勤勤引得心光發九品蓮花必現前諸仁者十方各有佛土而獨勸往西方者何也蓋西方極樂是眾生願往之好地方阿彌陀佛是眾生願見之慈父母一生其國智慧即圓神通即發分身度世與佛同遊統一切眾生到菩提彼岸有無量之樂故名極樂也極樂彌陀德大哉清涼世界寶蓮臺化禽晝夜音聲起喚得人人心地開本性真光是即念之佛體也精進往生是即佛之念用也當知無為是有為之體故是念中之佛也有為是無為之用故是佛上之念也因體立用念力森森攝用歸體佛心寂寂行人要體用兩得方不孤負自然合道神超三界外心現一聲中體用分明在無邊念力雄且不必多說總而言之念佛是往生真因緣往生是脫苦真境界無此念佛因緣何得往生脫苦一切眾生生也苦老也苦病也苦死也苦凡是苦境無一不苦愛別離苦怨憎會苦求不得苦有如是種種之苦可不念佛離之乎娑婆苦娑婆苦娑婆之苦誰能數無窮升降逐風輪插脚難憑多失所出沒閻浮不可停頭顱改變成今古何不及早念彌陀免此娑婆苦諸仁者細細思量苦難盡述既知娑婆之苦當求彌陀淨土之樂西方樂西方樂西方之樂全無作自然生起念佛心風吹樹網成天樂辟支聲聞入一乘人天善道無三惡何不及早念彌陀領取西方樂諸經說念佛一法為緊要法門然利益甚多約有十種生前死後皆大利益一者晝夜常得諸天大力神將并諸眷屬隱形守護二者常得二十五諸大菩薩如觀世音等及一切菩薩常隨守護三者常為諸佛晝夜護念阿彌陀佛常放光明攝受此人四者一切惡鬼若夜叉羅剎皆不能害一切毒蛇毒龍皆不能害五者一切火難水難冤賊刀箭牢獄杻械橫死枉死悉皆不受六者先所作罪悉皆消滅所殺冤命彼蒙解脫更無執對七者夜夢正直或復夢見阿彌陀佛勝妙色身八者心常歡喜顏色光澤氣力充勝所作吉利九者常為一切世間人民恭敬供養禮拜猶如敬佛十者命終之時心無怖畏正念現前得見阿彌陀佛及諸聖眾手持金臺接引往生西方淨土盡未來際受勝妙樂堪嘆世人名聞利養一世用心不顧生死大事便做得掀天動地霎時過去還如水上浮漚奉勸大眾莫更蹉跎也吾今宣說蓮池大師偈語汝等一心聽之一心不亂隨其大小九品往生故知世人無有一人不堪念佛若人富貴受用現成正好念佛若人貧窮家小累少正好念佛若人有子宗祀得託正好念佛若人無子孤身自由正好念佛若人子孝安受供養正好念佛若人子逆免生恩愛正好念佛若人無病趁身康健正好念佛若人有病切近無常正好念佛若人年老光景無多正好念佛若人年少精神清利正好念佛若人處閒心無事擾正好念佛若人處忙忙處偷閒正好念佛若人出家逍遙物外正好念佛若人在家知是火宅正好念佛若人聰明通曉淨土正好念佛若人愚魯別無所能正好念佛若人持律律是佛制正好念佛若人看經經是佛說正好念佛若人參禪禪是佛心正好念佛若人悟道悟須佛證正好念佛普勸諸人火急念佛九品往生花開見佛見佛聞法究竟成佛始知自心本來是佛祖師明明說汝等細細聽歸家無二路一佛鎮常靈念佛人以極樂為家解脫無邊境界天上人間莫比其樂以念為因以佛為緣以念佛為因以往生為緣因緣相契淨土成焉如以艾取火中用圓水精火自曰中而來降艾即眾生也日即佛也水精即念也火生艾上即是彌陀接引之相本心不動處方便十分圓妙有因緣在花開五色蓮精進無虧品第五大眾既知西方極樂娑婆極苦自當及早出離火宅依法花經說此娑婆界猶如火宅不可久居幼子嬉遊不知迴避長者有智乃以羊車鹿車牛車引之令出汝今速出我當與汝如是三車子既出已向父乞車長者乃以無量莊嚴造大白牛車令此諸子平等受用三車是上中下根大白牛車入佛一乘更無同異也下根自度羅漢之類中根一半度人一半度己出無佛世名為獨覺出有佛世名為緣覺上根度盡眾生為量菩薩一類會之歸一入佛知見更無三等之別如阿彌陀佛現大圓鏡智但一寂光無有二土也然開一為三亦用方便更不執一乘之同如彌陀淨土於一種蓮花現作九品也寂光一乘不離三乘三乘往生不離一乘不離一乘故純用念佛一法不離三乘故佛現九品蓮花九即是三三即是一入佛知見更無餘事故念佛人必須精進求佛境界常空其心不令有著念起即佛他事不留應緣而已此一佛名不念到家終不歇手故一心四字四字一心拆也不開合之無迹亦不是合本非二也亦復非一亦非不一如是念佛如是一心是真精進精進事成就切勿任麤心一心不退轉花開寶月臨七日中用心勇猛精進也於早晚功課回向發願用心恒常精進也若花嚴法界頓悟圓融即頓即圓非生非佛總十界而為一混三身而同空一句彌陀更無餘事縱橫情量破盡無餘則最勝矣古人云無邊剎海海涵空海空便現蓮花宮蓮宮周遍遍空海空海獨露彌陀容此法界無礙圓融乃無邊精進也無邊精進者即此現前一念之佛一佛之念非總非別非同非異非成非壞亦總亦別亦同亦異亦成亦壞其圖云隨舉一法六法皆全無礙圓融思之可見此六相有比譬在宗鏡錄上今試仿其說譬如人之一身是總相也頭腹手足則別相也頭腹手足皆是身則同相也頭且不是腹足且不是手則異相也頭目手足聚而為一身則成相也頭高而腹𢍉手足各分其左右散而各住於自位則壞相也壞者離也成者合也異者非也同者是也別者偏也總者全也舉一身之頭目手足以為言則總別同異成壞一時而全現萬法皆然矣又復即此現前一念之佛一佛之念即真即𢆯真𢆯無覓處其圖云海一滴之水含百川之味鏡一尺之鏡現千里之影金眾生雖惡心中佛性不變如真金被燒被埋本色猶黃燈一室千燈光非同異月初八之月輪帶暗明瓶水晶瓶中芥子粒粒齊現珠天帝寶網一珠體含千珠影千珠各含千珠影帶影入珠攝珠兼影拳擎拳竪臂觸目皆道不必捨目前而別求他處夢一夕魂夢回翔百年星各住本位面面有隣動而常靈誰主誰伴隨舉一𢆯十𢆯皆具亦無礙圓融思之可見此十𢆯在花嚴疏鈔中有十種名五教儀及長者論亦更標之今酌書於十字之後第一海字是同時具足相應門第二鏡字是廣狹無礙自在門第三金字是諸法相即自在門第四燈字是一多相容不同門第五月字是秘密雙融隱現門第六瓶字是微細相容安立門第七珠字是光影交參涉入門第八拳字是託事顯法生解門第九夢字是十世隔法異成門第十星字是主伴圓融具德門無邊精進非有分別東西淨穢之心非無顯現生佛往來之事法法如是心心如是視兩土猶微塵依一真如昨夢上上根種能救下下人不滯中中原非上下此無邊精進我先讚之一佛彌陀全法界琉璃影事現虗空東方西土原無礙發得蓮花十倍紅此恒常精進我亦讚之依真而住心常妙用法皆靈佛有神莫把光陰空過了蓮花國裏轉音輪此勇猛精進我終讚之大體圓融非晝夜一心直往有光明聲聲逼得蓮花放那復輪迴起不平精進從音聲入六根之中耳最虗靈舌根運出耳根運入非舌非耳即出即入棱嚴云由是意銷庶乎其可以銷意也意地清而六根淨故曰都攝六根淨念相繼其聽音之法三種精進中皆可行之其事已畢其時方閒其地不煩其身無苦可置一圓几於小室之中繞而念佛三帀繞之音滿一室矣即置此身心於聲音中而念之久而音中神光圓聚即置此身心於光明中而念之鏡裏音聲聽更圓無邊蓮萼一時鮮精神脈脈何終始那復東西見大千如此用心臨命終時如鏡光收物影物影入鏡光非入非收自然映現兩鏡交光處一火飛紅心清涼落影時彼此是知音定慧相隨品第六一切佛清涼妙法以戒為先戒者止也止惡行善止世間善行出世間善止麤善行妙善善之妙也心常超過一切境界神光不動萬法皆閒名之曰定心常照見一切境界神用不測萬法皆靈名之曰慧定中不知有慧慧月常圓慧中不說有定定光常住其中道理有淺有深交互引生一妙安然不作三觀直取光明法界寶用如珠走盤昔大勢至菩薩在棱嚴會上自述圓通境界乃是以念佛心入無生忍念時是定入時是慧入無生忍後攝念佛人歸於淨土念而入是定攝而歸是慧此是一人之定慧念佛三昧為定觀其音聲即得解脫為慧此又兩菩薩共一定慧也佛用兩菩薩以成熟眾生自身凝睟是定十方化往上善全臨是慧此又交錯而為定慧也一佛是定專念是慧念入佛慧真成三昧念佛之人既然修行先要明理若於君臣父子夫婦朋友兄弟五倫多諸敗德則定慧之種已傷不能往生淨土蓮花韻自清光圓氣乃足娑婆鬧不清依舊沈諸欲念佛之人既然修行先要得路若一味入種種邪教背佛忘親託說升天見鬼此人死後必墮無疑定慧之路既差不能往生淨土一直歸家去中閒無二路離佛求菩提無汝站脚處念佛之人既然修行不可泛泛若又念釋迦本師又念藥師琉璃又念寶髻如來以為放生又念毗盧遮那以為是花嚴主佛頭頭不了賬賬不清一佛既無感通千佛何從救汝騎雙頭馬踏兩頭船定慧之功既非不能往生淨土一佛無量佛莫作種種見會念彌陀者佛佛皆護念念佛之人既然修行不可夾襍又要拜懺又要拜經又要持呪又要看經又要苦行朝山又要閉關入定又要長坐不睡又要辟穀離人又要多集事緣又要高居名相打算既熟心光全昏才落一機便墮生死可知道念佛為正諸行為助不知主客認奴為郎斷無出頭之路苦哉大險一死一生何了局也定慧之力既分不能往生淨土心念紛飛起無一而可成他端得力處彌陀更不真念佛之人既要修行不可太過慈則纏縛忍則無情全非佛心有何正念要使物來順應事過即空亦不宜深入山林昏昏死於一法亦不宜雜然塵俗擾擾無有出期單入一邊終成墮落定慧之性偏枯不能往生淨土水火常相濟生殺用都靈能死不能活斷非西方人念佛之人既然修行必先離障凡生平一人之不捨一物之不忘一事之留神一端之抱憾到了命終總要分神神既分了念何能圓念既不圓佛何能應定慧之用不靈不能往生淨土真心無量光光中世界淨有障須懺悔便是心王印念佛之人既然修行不可落空若不發願難成淨土願既發了早晚要熟習其願每晨昏拜佛頭至地必至誠祝云弟子某人一心求生極樂世界如是願願相接煖氣不斷與佛常親自然得手必不可神光離合或行或止使無上寶願轉落空亡是為至要若忘失了即昏散矣定慧之功有虧不能往生淨土純心終入脉恍惚即亡真願願交光處彌陀度此人念佛之人既然修行於本參一句不可忽略此阿彌陀佛四字乃是我救命金剛寶劍若是工夫有進退不能打成一片躭圖順習流入死生一念才非全身悉墮古人用心則不如是除喫飯睡寤這一句都是炯炯現前無斷無續乃至喫飯睡寤時亦是此一句炯炯現前則大妙矣或疑睡著無夢這一句還現前否曰現問何以知其現曰汝在何處睡曰我睡床上曰汝早不能現前也著衣喫飯皆在阿彌陀佛大光明中不曾咬著一粒米不曾挂著一條絲只為生死事大不能半路歇手汝却見床不見佛哀哉定慧之境不純不能往生淨土十面縱橫處三生得力時只消一句佛以外更何知念佛之人既是修行便要去疑惑一者疑人說他未必生淨土空空勸人未足信也二者疑法說修行不易深大法門尚難成佛何況匇匇世上凡人念了四箇字望此大大好處不足信也三者疑已看世上人固不同樣有去有不去但我此一身妄影既多功夫又淺塵勞難歇悟境全無焉能指望佛恩雖寬不度下劣我且下種姑待來生強說生西我不信也如此三疑自戕真種蓮花未茂自起猛風可惜哉定慧之運不超不能往生淨土玲瓏諸佛境全現一心中鏡裏融光影何曾說異同念佛之人既要修行當破盡情量一切儒道諸家之說勿存留作解自礙真光於禪淨異同亦雙雙打落單留一念四字才圓若作禪之五宗教之三派律之持犯淨之偏圓太作是非橫分高下一真既掩九品皆空哀哉輪回再受無窮之厄矣上上下下隨分得之度人度己能行即行既不可忘亦不可執悲光智力不少不多自有往生消息也若見時了了行時昏昏說得分明修得勉強四字提不起六道必長居定慧之心未消不能往生淨土欲去即便去欲住即便住極樂無量光明明一條路是故定慧常於有心處習之常於無心處得之有心處無心則習之純矣無心處能用其心則非死水矣死水不藏龍真際中圓圓不隔方為了事一句四箇字送汝到西方若愁不得去及早好商量念念現前品第七果肯用心一真自現彌陀淨土豈在遠乎迷此別求哀哉永劫昔皇甫士坊作淨土十二時頌詞旨老實感動人心今誦之以警諸仁者平旦寅常時佛課在凌晨一刻工夫十聲號能超生死出沈淪希有法妙難論往生全以信為因君能信受無疑惑便是多生授記人日出卯朝露易晞人易老試將親友細思量眼前多少埋荒草要修行須及早一寸光陰無價寶閒時不肯念彌陀只待臨終空懊惱日高辰人世遷居必擇鄰莫向人天求福報壽終難免再沈淪生忉利作轉輪暫時快樂未為真勸君念佛求西去永作逍遙自在人禺中巳食時處處炊煙起自餐飽飯自充飢自己修持了生死子憶母母憶子到底工夫全在己棄捨身心見願王十萬餘程近如咫日南午佛日當空目不覩一條直路少人行反向長途受辛苦不談禪不揮麈念念彌陀常作主雖然身未出娑婆棲神已在蓮花土日昳未六蛇共室真堪畏出沒閻浮是幾遭多生還不分涇渭猛回頭滌塵胃人命無常須不諱死字常將挂在眉纔覺西方有滋味晡時申歎息人身似轉輪此身不向今生度更向何生度此身休錯過莫因循幾多帶角與披鱗千佛慈悲難救度塵沙劫數自沈淪日落酉返照餘光不長久堪笑愚人顧目前死生大事君知否臭錢財閒茶酒賺得凡夫終日走波波不暇念彌陀日月到來空束手黃昏戌一盞孤燈明夜室上床別了韈和鞋魂夢冥冥黑如漆嘆人身容易失要出輪回須念佛無邊罪障一時消佛光皎似千輪日人定亥富貴功名不常在枕上黃粱夢未醒癡情猶自憂千載略因循成懈怠一息不來窮劫悔孤負西方老願王遙垂金臂恩如海夜半子淨穢相形分彼此不是娑婆苦折磨誰肯灰心厭生死既厭離要知止黃金地上樂無比眼前煩惱為誰來都是西方促裝使鷄鳴丑君欲往生誰掣肘煩惱場中正好修念佛須教心應口離是非無可否凡事隨緣我何有但看蓮花不陸生結根偏在泥中藕此十二時頌所說雖粗可以啟發古人云諸人被十二時辰使老僧使得十二時果然十二時中念念用心處處憶佛雖不能使十二時亦不為十二時辰使矣但念念工夫必生效驗不貪效驗方是工夫切不可以念念現前為自足葢正念所結理事二種好境界皆是幻果不可貪其味才生一念即墮落有期彼外道魔王純乎以境界為事為佛弟子求生極樂轉轉落境即是謗三寶也念念之功須於一切時一切處用心空空靈靈久而自應蓋用心非用方能契真此心一真即是念佛心性於心性上現出一句佛才是真佛不然動靜都成境界念佛總不能達邊到底如棒擊水何異不擊乎如刀割水何殊不割乎有事而無功是為癡人無事而有功方為智者雖然無事不妨有事方是真無事也方是念佛心性也若起心動念而求無事乃多事極矣虎鬥龍爭勢已平江天風靜月華清聞君欲覓還鄉訣認取涼宵念佛聲何以念念之功要從耳根起蓋人止六根而眼鼻身三根太拙功德不全依法花經唯耳舌意三根最為圓快是故入手從此三者起此三之中意根是心之幾念佛之念依他而現既現於意乃運舌而出聲舌意二根勞久則倦無有入路仍有退機必用耳以聽之耳主神明出入略一注之意根即空靈宛轉不落動靜舌根任他高低運用全不拘束他微風吹動則念佛自然如天樂鳴空雲中雁語風鈴在塔鼓角依更我不責之鳴而任其自鳴斯可以得其大意矣大意既得再細研之靜觀煩惱成瓔珞多用音聲作管絃何處天涯方擾擾半空明月已將圓細之又細我不知之諸仁者當自知勿著痕跡勸君休辨淺和深離念須臾得好音十面風聲齊入化定中消息比眠琴雖然未足以盡其妙也絃外音聲聽更清本來塵世即無生雁鴻影落江波上非有非無畫不成又有觀想念佛一門從有生滅中一轉而入無生滅性蓋此有生滅全依不生滅者起故一轉即回頭也其中二法最要一者直觀丈六彌陀立池水上二者專想彌陀眉間白毫也白毫八稜中空色白右旋五轉散作無邊光徧攝羣生歸於淨土此白毫觀成入路最捷注想兩眉中間久之自然顯現但觀想所引之境亦從心性中來故作觀持名皆得稱為念佛矣若強役妄心揑成幻相邪觀既發魔境乃生不可救也一佛當令千魔退聽何以能之此心不病所以十六觀經云諸佛如來是法界身入一切眾生心想中汝等心想佛時此身即是三十二相八十種好是心作佛是心是佛作佛乃言體上之用是佛乃言用上之體一切佛法本來現成借觀而現現於自心非造作而後有也無作之作作而不作無是無非佛佛靈機不明法界之全休談觀想未悟棱嚴之旨莫學禪那修行美名必不可貪修行好相必不可取不牽名相便是知音音光涵一際苦海息奔騰念念彌陀現空靈鏡裏燈往生入位品第八時候已到自己須知錯過機關千生難遇既然時時回向西方步步求生淨土佛心感動小示光儀偶生一念之粗即障無邊之妙如此之病病者不知世無醫人能醫此病當於一切處用心妙遇真宗平常接待則無事矣無事則現前無障空空任現運運常靈時至往生更無疑惑病是何事而汝憂之當早捨身心專一待死死即往生非待非不待乃為好手眾生會謀生死時不會死顛倒既現前難入蓮花裏一切淨土諸書所有回向之文只有蓮池四百字一篇才為圓密稽首西方安樂國接引眾生大導師我今發願願往生唯願慈悲哀攝受弟子普為四恩三有法界眾生求於諸佛一乘無上菩提道故專心持念阿彌陀佛萬德洪名期生淨土又以業重福輕障深慧淺染心易熾淨德難成今於佛前翹勤五體披瀝一心投誠懺悔我及眾生曠劫以來迷本淨心縱貪瞋癡染穢三業無量無邊所作罪垢無量無邊所結冤業願悉消滅從於今日立深誓願遠離惡法誓不更造勤修聖道誓不退墮誓成正覺誓度眾生阿彌陀佛以慈悲願力當證知我當哀愍我當加被我願禪觀之中夢寐之際得見阿彌陀佛金色之身得歷阿彌陀佛寶嚴之土得蒙阿彌陀佛甘露灌頂光明照身手摩我頭衣覆我體使我宿障自除善根增長疾空煩惱頓破無明圓覺妙心廓然開悟寂光真境常得現前至於臨欲命終預知時至身無一切病苦厄難心無一切貪戀迷惑諸根悅豫正念分明捨報安詳如入禪定阿彌陀佛與觀音勢至諸聖賢眾放光接引垂手提𢹂樓閣幢幡異香天樂西方聖境昭示目前令諸眾生見者聞者歡喜感歎發菩提心我於爾時乘金剛臺隨從佛後如彈指頃生極樂國七寶池內勝蓮花中花開見佛見諸菩薩聞妙法音獲無生忍於須臾間承事諸佛親蒙授記得授記已三身四智五眼六通無量百千陀羅尼門一切功德皆悉成就然後不違安養回入娑婆分身無數徧十方剎以不可思議自在神力種種方便度脫眾生咸令離染還得淨心同生西方入不退地如此大願世界無盡眾生無盡業及煩惱一切無盡我願無盡願今禮佛發願修持功德回施有情四恩總報三有齊資法界眾生同圓種智他之文句悉包全部花嚴不誤眾生可以遵奉日日功課宜體會之得此靈熏運運成就作家手筆也尋常演出蓮花自在香莫道修行無規矩依他所說便清涼但要字字句句懂得層層折折想到真心全量探喉而出一徧願文可抵十年修不用心者於此願文昏昏忽過空受菩薩戒枉作修行人生死現前隨風而倒捨報也大難疾走無好步所作不圓成又入中有去中有者已死而未入六道之身既落中有豈得往生十个九人往往如此哀哉大險切勿蹈之凌空一步最安詳心現蓮花便吉祥莫道其中無九品本來舉念即西方到此工夫禪定中捨身定起即是生西方西方起故東方不起此所謂東方入定西方起非死生也但入定與出定即此一念光陰太峻快耳寶地經行空外影玉樓宴坐定中身紛紛幻果齊消落唯有清涼寶願輪平時發願之因此時結成果非著意非不著意雙涵並照不動步而到佛亦來迎我亦往生翛然閒暇乃真上品從心而念佛欣羨悉皆亡功夫任運成法法皆清涼若論依法法亦多般若論從心心只一个棱伽云智不得有無而興大悲心此菩薩往生境界也眾生擾擾根器各殊九品既分一言難盡上品上生者圓具三種心誠心及深心回向發願心佛身來接引彈指即往生坐於金剛臺凝然而入位上品中生求佛妙法於第一義心不驚動紫金臺上經宿花開不退菩提飛行自在上品下生發無上心五百佛身一齊授手經一晝夜金蓮花開七日之中見佛聞法中品上生戒善無過佛及羅漢光明照之花中往生證第四果中品中生者戒持一晝夜七寶而為花蒙佛來接引中品下生一生慈孝聞淨土門死而即往觀音勢至為轉法輪下品上生多造惡業聞經名字及淨土因化佛來迎罪滅往生獨有觀音先為說法下品中生先犯戒相地獄已現忽然回心風吹天花化佛來引下品下生十惡五逆命終遇救十分心真花如日輪飛空來接應念而往精進乃超蓮花雖有九品升降但從一心莫滯其機居然得路雲開月現春至花香悉入真宗齊成妙遇一句齊收入泠泠念佛音奇哉真境界即此眾生心身土圓融品第九身心世界四種皆一光明無量而已光中身心安光中世界淨如水鏡照物雖一切皆現而浺瀜無有物也佛觀一切眾生身心世界但是一道清虗眾生念佛當以佛之心為心也要將身心世界看得一道清虗方能入佛知見兩鏡光中絕點塵佛身還以佛為鄰心心交映無終始剎海圓融寫一真佛以法為身是第一身念此佛者生寂光淨土從法身上現出修行而成報身是第二身念此佛者生實報莊嚴淨土從報身自受用上開出他受用身是第二身影子亦名應身念此佛者生方便有餘淨土從報身上現出大小種種諸化身是第三身念此佛者生凡聖同居淨土此乃竪說須不見相而橫竪渾融乃為真佛真念也層層高下映獨出顯森羅一線穿成處千珠不較多如此乃是淨土中分別淨土土異身異必待融而後融也若知四土一心一心四土乃土融矣然融淨而不融穢非真融也四身一體一體四身乃身融矣然融極聖而不融一切聖凡非真融也至於觸境皆融聖凡無二花嚴三昧之身土消息可商此種境界即佛也身身互映全無作剎剎玲瓏不見痕一切求之無可見不妨法法普成門一切聖身四聖如一一切凡聖九品如一一切十方凡聖皆現目前自觀己身與十方身彼彼此此即彼即此非彼非此土與土融亦復如是此種境界即佛也花藏世界所有塵一一塵中見法界身界二塵皆如是圓成一境普清涼一切身一切土莫不融一切身一土莫不融一身一切土莫不融一身一土莫不皆融此中境界即佛也情與無情皆佛道況乎生佛本圓融智光不動無終始十面回環即主公一切身中身不礙剎一切剎中剎不礙身一切剎中身不礙身剎一切身中剎不礙剎身此中境界即佛也交參涉入無通塞海印重重普發光那有語言及文字逢時且作法中王一無礙一切無礙放出現千千一切無礙一無礙收來無一一此中境界即佛也表裏玲瓏絕有無十分情量破無餘生平艶羨陶朱富那識衣珠自足娛無礙與無礙全無礙無礙與有礙全無礙有礙與無礙全無礙有礙與有礙全無礙雖一个全無礙而不廢有無亦有無非有無四句此中境界即佛也一毫不動常如此萬變紛紜事若何靜臥已消無量劫更無情緒說多羅埽礙者亦應埽無礙立無礙者還同立礙埽立一時光明具足有琴無絃妙音常發水中鹽味分際親嘗有人識取雲外天香諸仁者我今不惜眉毛拖地為汝指示中人之質須勤看彌陀疏鈔及棱嚴經兼及棱伽法花金剛圓覺維摩等則一乘佛境界之根本立而淨土已圓頓現前矣從稜嚴之有規矩入花嚴之神明於規矩如風無礙如月出雲如鏡寫燈如珠映網層層密密不漏一絲不挂一絲神遊法界任運而念佛自然踏得著這一步圓融一念中分明四字佛消息全玲瓏何為空自屈駐雲飛十首戒十惡也雞園修士嚴一程妙現漫說牢牲籃蛤猶關坡老情痛癢同吾性匕箸皆生命若令眾生生歡喜者則令一切如來歡喜供養取羶腥喉嚨逕寸縱不持齋食肉依三淨不見殺不聞殺不為自己殺勸君殺業因緣總戒清竊玉摸金我輩原無者樣心李下冠休整馬待錢方飲合目冥心子細聽但取色和聲塵根不淨宿債須償豈肯饒分寸勸君盜業因緣總戒清未斷情根輪轉三途不出塵魔眷隱形影戒體非乾淨一切眾生皆住法性三昧切莫因慧而傷定何況是邪婬更當猛省忍此須臾血氣登時定勸君婬業因緣總戒清隨口縱橫字字都非肝肺生說鬼憑誰證有虎驚人聽一語不天真千言難信誑習交欺千古成通病有慨乎其言之勸君妄語因緣總戒清覆雨翻雲播弄人間事不成骨肉還滋釁道路都含憤試問甚心情揣摩難準求則得之舌泥犁地獄也恐有斯人分勸君兩舌因緣總戒清無愛無憎耳畔何來此惡聲盛怒尋瑕釁穢語施閨壺張口殺機生言言太忍不見山膏善罵無人性山膏獸名善罵出苦山見山海經勸君惡口因緣總戒清思也風也氣也幻也夢也決定也巧毒也因便也恍惚也因循也庸愚隨順也又曰說到使君自有婦羅敷自有夫與花嚴離垢之旨同一森嚴矣說到生靈皆赤子乃使人恭敬慈悲之意油然而生又曰孟子言嫂溺援之以手而已今增滿其意乃曰生靈皆赤子恭敬好相扶嗚呼由是意銷威光特違矣右婬言必由衷如本分重輕入脈無淆移宮換羽逞奸刁青蠅移白黑雙管也難描惡報身形何定準有無多舌滔滔都因反覆業難消誤人成熟路何必衡量失心標多舌者增之報無舌者滅之報法界無增減而欲增減焉故自受之矣右兩舌善氣從容成脉理一言能鎮河山蓮修芬馥吐三三妙音成解脫何處著粗頑是極抵突剛強兼毒穢性情如隔千關無端赤舌更何堪音聲難入聽消息婉而多諷請君參化曰口出蓮香尚非究竟幾人參透口過免矣夫右惡口一理分明成境界本來表裏相當光明心事總無妨從心流妄語威德損心王可知道縱使三緘無口過心風念動聲揚靈靈啟告遍諸方精神成恍惚仔細無盡意言殃淨曰念動則有風風起則有聲又曰念必有境境皆成文故是詞句矣又曰意動則有言現於心雖未沖喉而出早得謂之意言入普賢機善用心聞知一切眾生心中念念中語右妄言曲折玲瓏心太巧風情𭥃旎含羞傳神最近粉骷髏空言成實境世世女為儔花果紛紛生後報沈酣豔妒嬌愁可憐一落便千秋聰明偏帶綺誤事多矣禪話尚風流慧曰不是風流不是禪請君下語又曰潘荀一輩久墮女身擲果移花多成罪案故有報也又曰此世受報為花報泥犁受報為果報隔一世為生報歷多生為後報也右綺語不淨居心難獨脫自然神墮天涯只知可愛便依他到頭依不住空自誤歸家客路千岐多刃蜜豈徒辛苦交加圓中無限現尖叉爛泥防有刺且欵欵莫更醉流霞潤曰我真欲去蓋心知幻樂之無多也右貪風火無端爭欲發飛傷功德叢林從容道韻有知音眾生皆劇苦何不且沈吟平心之論消落心兵成慧用不煩鑄氣為金休因失意便昏沈勸君觀法界之彌廣何古復何今真曰師心幸為無量也右瞋從古修行多誤事更無一法當胸是極瞥生知見轉盲聾天然消息在自塞妄求通可憐可恨外道邪魔根緒幻天下本來識鏡同空本無事庸人自擾之天堂地獄影重重花嚴妙悟何處根塵十方微動處猛聽一聲鐘密曰弟子慚愧右癡臨江仙破十惡也玉尺禪仙作放逸居心曾不檢番番戕賊生靈凡軀慧命一時傾無從心起而身口肯之故十惡具矣心身與口有意愛和嗔細析精研豈必自家成故誤積冤多在因循破除性相乃能拼無邊生死窟累劫墮何能愛則貪食肉寢皮而殺之或因愛彼而殺此積冤多在因循陽宦陰官聞此皆當猛醒非徒血食一端也修曰破除一任破除還是拙破好巧破好盡情破好不盡情破好試定當看右殺隨分光陰安命了何煩著意求多乘除損益鏡中過一笑私心增積聚對物總消磨高下各爭名與利暗明強弱殊科丘山芥子報無訛空了故苦不空故苦水流花落盡罰重慘如何贊曰更有一種人於修行二字上偷心反覆死不盡右盜慚愧從來都聖德身形愛欲原請君仔細看粗念生心境即糢糊菩提煩惱樣顛倒畫葫蘆恥別具風流成罪相怪哉鈎深況及無辜使君終莫念羅敷請看定盤星生靈皆赤子善哉恭敬好相扶這一鉤可拍靈曰粗字下得切一曰顛倒葫蘆寫盡交爭之致嗚呼菩提煩惱一耶二耶通曰別具二字銜得十方世界天條王法陰刑護曰別則各異具則皆同又曰別別繫縛別別解脫婬之途正復無涯也或以男誤女或以女誤男或以男誤男或以女誤女或以非男之人誤女此五種婬是可指著至於精神遞互交雜離奇則有不可思議者以要言之一念之疎顛倒無邊也俊曰此風流罪相入佛鏡中一覽無餘又曰鉤深二字寫盡心肝鉤有多種聲也色也明也暗也態也情也勢也財也獨也眾也身也口也文也影也影也畫也香也衣也言也笑也故事也小說也新聞也戲齣也眼也手也神也膩旨妍音舌底波瀾欠老成直與俳優等易動纖兒聽威光何在下筆盡婬聲未刪衛鄭描寫風流最是才人病勸君綺語因緣總戒清日夜經營為此區區血肉身氣與金銀競力為妻拏罄尋丈數先盈還爭尺寸谿壑難填貪因可好而生何者心纔稱勸君貪業因緣總戒清心無盡則好亦無盡怒氣填膺匣裏龍泉似欲鳴一念天和損六道修羅近煩惱本無城莫迷心性人我雙忘萬事如灰冷勸君嗔業因緣總戒清一味無明便作凡夫三惑皆從無明起了一生根器休嫌鈍因果微妙因果先當信真信是誰智慧屬天成何修何證心鏡孤懸不蓄纖毫影勸君癡業因緣總戒清
