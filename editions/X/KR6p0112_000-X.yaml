body:
  text: 蓮消息真心本體清淨圓明不屬一邊全該萬法乃以無始一念忽起無明遂於清淨本然現出虗空大地譬如燈中有鏡鏡中有燈六道四生重重無盡諸聖諸凡普同出世回環映現化度不休遠矣哉人之生也十月血腥三年乳濁從一世及多生緣影為心四大為身生死死生形神流轉莫補江心之漏空增夢裏之哀苦樂千般恩仇萬變分明因果當局全迷可深嘆也此書層層解說剝去粗庸脉脉深涵出生眾妙歸家一路導我前行九品之文顯出往生淨土異方便矣諸善女人兼眾檀施刊刻流布回此功德利益有情同生安樂淨土圓現娑婆頓空佛國為家蓮花在足光明鏡影無有纖痕莫更遷流致生種種同治十年冬妙空子書於百城煙水之居蓮消息目次性相光明品第一背覺合塵品第二消息輪回品第三淨土因緣品第四精進無虧品第五定慧相隨品第六念念現前品第七往生入位品第八身土圓融品第九附駐雲飛十首戒十惡嚴一程妙現臨江仙破十惡玉尺禪仙作
